[build]
  base    = "Coolivate-Website-31Mar2026"
  command = "pnpm install && pnpm --filter @workspace/coolivate run build"
  publish = "artifacts/coolivate/dist"

[build.environment]
  NODE_VERSION = "20"
  GIT_LFS_SKIP_SMUDGE = "1"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200